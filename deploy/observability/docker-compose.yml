# Phase 6 observability stack (17-observability-model, ADR-009/014).
#
# Brings up the engine plus a full, vendor-neutral telemetry pipeline:
#   app → OTLP → otel-collector → Tempo (traces)
#   app → /metrics ← Prometheus (metrics, SLO recording + alert rules)
#   Grafana ← Prometheus + Tempo (dashboards, trace↔metric correlation)
#
# Run from the repo root:  docker compose -f deploy/observability/docker-compose.yml up --build
# Then open Grafana at http://localhost:3000 (admin / admin).

name: scp-observability

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      SCP_LOG_LEVEL: INFO
      SCP_TRACING_ENABLED: "true"
      SCP_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/ready').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./otel-collector/config.yml:/etc/otel/config.yml:ro
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"
    depends_on:
      - app
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
