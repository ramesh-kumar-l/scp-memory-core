# Prometheus scrape + rule config for the SCP Memory Engine (Phase 6).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.rules.yml

# Ship firing alerts to Alertmanager, which routes them by severity.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: scp-memory-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: scp-memory-core

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
