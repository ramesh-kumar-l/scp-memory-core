# OpenTelemetry Collector config (Phase 6). Receives OTLP spans from the engine
# and forwards them to Tempo. Vendor-neutral hop (ADR-009) so the trace backend
# is swappable without touching the application.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch: {}

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
